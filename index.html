<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEO Retro Rocket Flame Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;700&family=Syne:wght=800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 200px;
  max-height: 200px;
  background: transparent !important;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  overflow: hidden;
  user-select: none;
}

/* Master Widget Boundary Anchor Frame */
.widget-wrapper {
  position: relative;
  display: inline-block;
  padding: 40px;
  min-width: 680px;
  min-height: 440px;
  border: 1px dashed rgba(255, 255, 255, 0.02); 
  cursor: default;
  transform: scale(0.675);
  transform-origin: top left;
}

/* CLEO Primary Kinetic Chassis Container */
.cleo-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: absolute;
  left: 48px;
  top: 10px;
  z-index: 10;
  width: 170px;
  transform-origin: bottom center;
  opacity: 0;
  transform: translateY(340px) scale(0.85);
  pointer-events: none;
}

/* Slower entry layout */
.cleo-container.rocket-spawning {
  opacity: 1;
  animation: rocketLandingStyle 1.05s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}
@keyframes rocketLandingStyle {
  0% { transform: translateY(340px) scale(0.7) scaleY(1.3); opacity: 0.2; }
  65% { transform: translateY(-28px) scale(1.04) scaleY(0.92); opacity: 1; }
  82% { transform: translateY(4px) scale(0.98) scaleY(1.02); opacity: 1; }
  100% { transform: translateY(0) scale(1) scaleY(1); opacity: 1; }
}

/* Persistent Hovering Loop */
.cleo-container.ready {
  opacity: 1;
  animation: robotHoverEngine 4.5s ease-in-out infinite;
}
@keyframes robotHoverEngine {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* Focused Cursor Interactions */
.cleo-container.ready.cleo-body-hovered {
  transform: scale(1.03) rotate(1deg) translateY(-4px) !important;
}

.cleo-svg-wrap {
  width: 100%;
  transition: filter 0.35s ease;
}

/* Interactive SVG Group Body Hitbox Anchor */
.cleo-interactive-target {
  cursor: pointer;
  pointer-events: auto;
}

/* Mechanical Pivot Arms Matrix */
.left-side-arm-group, .right-side-arm-group {
  transition: transform 0.22s cubic-bezier(0.25, 1, 0.5, 1);
}
.left-side-arm-group { transform-origin: 92px 178px; }
.right-side-arm-group { transform-origin: 188px 178px; }

#earLeft, #earRight { transition: fill 0.35s ease; }

/* ─── DYNAMIC TRANSITIONAL MOOD LOOPS ─── */

/* Cheeky Loop */
.widget-wrapper.mode-cheeky .left-side-arm-group {
  animation: cheekyWave 0.45s ease-in-out infinite alternate;
}
@keyframes cheekyWave {
  0% { transform: rotate(5deg); }
  100% { transform: rotate(48deg); }
}
.widget-wrapper.mode-cheeky .right-side-arm-group {
  transform: rotate(-18deg) translateX(-2px);
}
.widget-wrapper.mode-cheeky #blushLeft, .widget-wrapper.mode-cheeky #blushRight {
  animation: blushPulse 1.6s ease-in-out infinite;
}
@keyframes blushPulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.45; } }

/* Panic Loop */
.widget-wrapper.mode-panic .cleo-container {
  animation: panicShake 0.1s linear infinite !important;
}
@keyframes panicShake {
  0%, 100% { transform: translate(1px, 1px) rotate(1.5deg); }
  20% { transform: translate(-1px, 0px) rotate(2.5deg); }
  40% { transform: translate(1px, -1px) rotate(0.5deg); }
}
.widget-wrapper.mode-panic .left-side-arm-group {
  animation: flailLeft 0.11s ease-in-out infinite alternate !important;
}
@keyframes flailLeft { 0% { transform: rotate(-8deg); } 100% { transform: rotate(68deg); } }

.widget-wrapper.mode-panic .right-side-arm-group {
  animation: flailRight 0.11s ease-in-out infinite alternate !important;
}
@keyframes flailRight { 0% { transform: rotate(12deg); } 100% { transform: rotate(-58deg); } }

/* Dreamy Loop */
.widget-wrapper.mode-dreamy .cleo-container {
  animation: dreamyDrift 5s ease-in-out infinite !important;
}
@keyframes dreamyDrift {
  0%, 100% { transform: scale(1.03) rotate(0.5deg) translateY(-2px); }
  50% { transform: scale(1.03) rotate(2deg) translateY(6px); }
}
.widget-wrapper.mode-dreamy .left-side-arm-group {
  animation: dreamySwayLeft 4s ease-in-out infinite alternate !important;
}
@keyframes dreamySwayLeft { 0% { transform: rotate(-5deg); } 100% { transform: rotate(12deg); } }

.widget-wrapper.mode-dreamy .right-side-arm-group {
  animation: dreamySwayRight 4s ease-in-out infinite alternate !important;
}
@keyframes dreamySwayRight { 0% { transform: rotate(5deg); } 100% { transform: rotate(-12deg); } }

/* STYLISH HORIZONTAL ROCKET FLY-RIGHT EXIT */
.cleo-container.rocket-jetting-right {
  animation: rocketFlyRightExit 0.75s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important;
  pointer-events: none !important;
}
@keyframes rocketFlyRightExit {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  22% { transform: translateY(8px) rotate(-18deg); opacity: 1; } 
  45% { transform: translateX(40px) translateY(-15px) rotate(52deg) scaleX(1.15); opacity: 1; } 
  100% { transform: translateX(640px) translateY(-120px) rotate(68deg) scaleX(1.4) scaleY(0.85); opacity: 0; } 
}

/* Integrated Thruster Flame System */
#rocketFlameGroup {
  opacity: 0;
  transform: translateY(-8px) scaleY(0.5);
  transform-origin: 140px 266px;
  transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.engine-firing #rocketFlameGroup {
  opacity: 1;
  transform: translateY(0) scaleY(1);
}

/* High Fidelity Combustion Flicker Animation */
.engine-firing .fire-plume-blur-outer {
  animation: combustionOuterFlicker 0.15s ease-in-out infinite alternate;
}
.engine-firing .fire-plume-blur-inner {
  animation: combustionInnerFlicker 0.09s ease-in-out infinite alternate;
}

@keyframes combustionOuterFlicker {
  0% { transform: scaleX(0.96) scaleY(0.95); opacity: 0.85; filter: url(#blurFlameOuter); }
  100% { transform: scaleX(1.04) scaleY(1.06); opacity: 1; filter: url(#blurFlameOuterDistort); }
}
@keyframes combustionInnerFlicker {
  0% { transform: scaleX(0.95) scaleY(0.97); opacity: 0.9; }
  100% { transform: scaleX(1.05) scaleY(1.03); opacity: 1; }
}

/* Eye Blinking Pipeline */
.eyes-blink circle {
  animation: blinkScale 0.16s linear forwards;
}
@keyframes blinkScale {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.05); }
}

#visorBg, #robotMouth, #blushLeft, #blushRight, #antennaStem, #antennaGlowNode {
  transition: fill 0.3s ease, stroke 0.3s ease, d 0.3s ease, opacity 0.3s ease;
}
.visor-scanlines { pointer-events: none; }

/* ─── SPEECH BOX SYSTEM ─── */
.chat-bubble {
  position: absolute;
  left: 200px;
  top: 70px;
  backdrop-filter: blur(18px) saturate(130%);
  -webkit-backdrop-filter: blur(18px) saturate(130%);
  border-radius: 18px;
  padding: 16px 22px;
  display: flex;
  align-items: center;
  width: max-content;
  max-width: 310px;
  min-height: 64px;
  z-index: 5;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  line-height: 1.55;
  opacity: 0;
  transform: scale(0.88) translateX(-14px);
  transform-origin: left center;
  transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.chat-bubble::before {
  content: "";
  position: absolute;
  left: -9px;
  top: 24px;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.bubble-cheeky {
  background: linear-gradient(135deg, rgba(255, 245, 220, 0.12) 0%, rgba(40, 22, 0, 0.55) 100%);
  border: 1px solid rgba(255, 170, 0, 0.35);
  box-shadow: 0 20px 44px rgba(20, 8, 0, 0.5), 0 0 24px rgba(255, 170, 0, 0.18);
  color: #fffaf0;
}
.bubble-cheeky::before { border-right: 9px solid rgba(255, 170, 0, 0.35); }

.bubble-panic {
  background: linear-gradient(135deg, rgba(255, 225, 225, 0.1) 0%, rgba(48, 4, 4, 0.6) 100%);
  border: 1px solid rgba(255, 60, 60, 0.38);
  box-shadow: 0 20px 44px rgba(38, 0, 0, 0.55), 0 0 28px rgba(255, 50, 50, 0.22);
  color: #fff0f0;
}
.bubble-panic::before { border-right: 9px solid rgba(255, 60, 60, 0.38); }

.bubble-dreamy {
  background: linear-gradient(135deg, rgba(215, 220, 255, 0.12) 0%, rgba(20, 12, 50, 0.6) 100%);
  border: 1px solid rgba(160, 120, 255, 0.38);
  box-shadow: 0 20px 44px rgba(10, 0, 40, 0.55), 0 0 28px rgba(140, 100, 255, 0.22);
  color: #f0eeff;
}
.bubble-dreamy::before { border-right: 9px solid rgba(160, 120, 255, 0.38); }

.bubble-bye {
  background: linear-gradient(135deg, rgba(255, 235, 215, 0.15) 0%, rgba(54, 25, 0, 0.65) 100%);
  border: 1px solid rgba(255, 115, 0, 0.45);
  box-shadow: 0 20px 44px rgba(40, 15, 0, 0.4), 0 0 24px rgba(255, 115, 0, 0.2);
  color: #fffbf5;
}
.bubble-bye::before { border-right: 9px solid rgba(255, 115, 0, 0.45); }

.widget-wrapper.active-hover .chat-bubble.visible {
  opacity: 1;
  transform: scale(1) translateX(0);
}

#cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  margin-left: 3px;
  animation: blink 0.6s infinite;
  vertical-align: middle;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.text-highlight-cheeky { color: #ffaa00; font-weight: 700; }
.text-highlight-panic   { color: #ff3b3b; font-weight: 700; }
.text-highlight-dreamy  { color: #b899ff; font-weight: 700; }
.text-highlight-bye     { color: #ff7300; font-weight: 700; }

.spark, .star-particle { position: absolute; pointer-events: none; opacity: 0; z-index: 15; }
.spark { width: 4px; height: 4px; border-radius: 50%; }
.star-particle { font-size: 10px; line-height: 1; }

/* ─── DYNAMIC FLOATING UNDER-CURSOR NOTE ─── */
.cursor-poke-note {
  position: absolute;
  pointer-events: none;
  background: transparent;
  border: none;
  color: #ffffff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 8.2px;
  letter-spacing: 0.6px;
  font-weight: 700;
  padding: 0;
  white-space: nowrap;
  box-shadow: none;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
  z-index: 999;
  opacity: 0;
  transform: translate(12px, 12px) scale(0.85);
  transition: opacity 0.12s linear, transform 0.12s cubic-bezier(0.16, 1, 0.3, 1);
}
.cursor-poke-note.visible {
  opacity: 0.85;
  transform: translate(12px, 12px) scale(1);
}
</style>
</head>
<body>

          </radialGradient>

          </radialGradient>
          
          <linearGradient id="thrusterPlumeOuter" x1="140" y1="265" x2="140" y2="425" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffb700" stop-opacity="0.95"/>

          </linearGradient>

          </linearGradient>
          
          <radialGradient id="gG" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#ffe080"/><stop offset="100%" stop-color="#c87800"/></radialGradient>
          <radialGradient id="rG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff7388" stop-opacity="0.65"/><stop offset="100%" stop-color="#f04156" stop-opacity="0"/></radialGradient>

<script>
const moods = [
  {
    name: "cheeky",
    wrapperClass: "mode-cheeky",
    visorFill: "url(#vGCheeky)",
    mouthD: "M132 100 Q140 108 148 100",
    mouthStroke: "#ffaa00",
    blushOpacity: "1",
    earFill: "url(#earGlowCheeky)",
    antennaColor: "#ffaa00",
    glowFilter: "drop-shadow(0 16px 40px rgba(255,170,0,0.22))",
    bubbleClass: "bubble-cheeky",
    cursorColor: "#ffaa00",
    highlightClass: "text-highlight-cheeky",
    highlightWords: ["boss", "switch tabs", "management"],
    particles: "sparks",
    phrases: [
      "Done or not? Don't wait until boss comes after you! 🫣",
      "Are we working hard or hardly working over here? 👀",
      "I won't tell management if you switch tabs right now. 🤫",
      "Productivity detected: 12%. Sneaking detected: 100%. 😏"
    ]
  },
  {
    name: "panic",
    wrapperClass: "mode-panic",
    visorFill: "url(#vGPanic)",
    mouthD: "M130 104 L150 104",
    mouthStroke: "#ff3b3b",
    blushOpacity: "0.1",
    earFill: "url(#earGlowPanic)",
    antennaColor: "#ff3b3b",
    glowFilter: "drop-shadow(0 16px 40px rgba(255,50,50,0.4))",
    bubbleClass: "bubble-panic",
    cursorColor: "#ff3b3b",
    highlightClass: "text-highlight-panic",
    highlightWords: ["ERROR", "Warning", "CRITICAL", "overload"],
    particles: "sparks",
    phrases: [
      "ERROR 404: Sleep not found. Send coffee immediately! ☕",
      "CRITICAL overload! Too many requests! Meltdown initialized! 💥",
      "Warning: Human interaction threshold exceeded. Panic routine now active!",
      "ERROR: Brain capacity full. Please restart human. ⚠️"
    ]
  },
  {
    name: "dreamy",
    wrapperClass: "mode-dreamy",
    visorFill: "url(#vGDreamy)",
    mouthD: "M131 101 Q140 109 149 101",
    mouthStroke: "#b899ff",
    blushOpacity: "0.7",
    earFill: "url(#earGlowDreamy)",
    antennaColor: "#c8a0ff",
    glowFilter: "drop-shadow(0 16px 40px rgba(160,100,255,0.28))",
    bubbleClass: "bubble-dreamy",
    cursorColor: "#b899ff",
    highlightClass: "text-highlight-dreamy",
    highlightWords: ["dream", "stars", "float", "wonder"],
    particles: "stars",
    phrases: [
      "Shhh… do you hear that? That's the sound of zero notifications. ✨",
      "Sometimes I dream of floating through a sea of data… 🌙",
      "Wonder if the stars have their own to-do lists… probably not. 💫",
      "Let's just float here a moment. The bugs can wait. 🌸"
    ]
  }
];

let currentMoodIdx = 0;
let charIdx = 0, typingTimer = null, particleInterval = null;
let isHovered = false;
let exitTimeout = null;
let activePresence = false;

const widget        = document.getElementById('cleoWidget');
const container     = document.getElementById('cleoContainer');
const glowWrap      = document.getElementById('cleoGlowWrap');
const visor         = document.getElementById('visorBg');
const mouth         = document.getElementById('robotMouth');
const blushL        = document.getElementById('blushLeft');
const blushR        = document.getElementById('blushRight');
const earL          = document.getElementById('earLeft');
const earR          = document.getElementById('earRight');
const antStem       = document.getElementById('antennaStem');
const antNode       = document.getElementById('antennaGlowNode');
const bubble        = document.getElementById('chatBubble');
const typed         = document.getElementById('typedText');
const cursor        = document.getElementById('cursor');
const pokeNote      = document.getElementById('pokeNote');
const bodyTarget    = document.getElementById('cleoBodyTarget');

const eyeLP         = document.getElementById('eyeLeftPupil');
const eyeRP         = document.getElementById('eyeRightPupil');
const eyeLS         = document.getElementById('eyeLeftShine');
const eyeRS         = document.getElementById('eyeRightShine');
const svg           = widget.querySelector('svg');

const eyeBaseL = { cx: 112, cy: 84 };
const eyeBaseR = { cx: 168, cy: 84 };
const maxOffset = 3.1; // Balanced max bounds tracking constraint 

function trackMouseInteractions(e) {
  if (!activePresence || container.classList.contains('rocket-jetting-right')) return;
  
  // 1. Precise Vector Eye Tracking Loop
  const rect = svg.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 280;
  const my = ((e.clientY - rect.top)  / rect.height) * 430;

  function movePupil(base, pupilEl, shineEl) {
    const dx = mx - base.cx;
    const dy = my - base.cy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ox = (dx/dist) * Math.min(dist * 0.15, maxOffset);
    const oy = (dy/dist) * Math.min(dist * 0.15, maxOffset);
    pupilEl.setAttribute('cx', base.cx + ox);
    pupilEl.setAttribute('cy', base.cy + oy);
    shineEl.setAttribute('cx', base.cx + ox - 2.5);
    shineEl.setAttribute('cy', base.cy + oy - 2.5);
  }
  movePupil(eyeBaseL, eyeLP, eyeLS);
  movePupil(eyeBaseR, eyeRP, eyeRS);

  // 2. Continuous Note Boundary Alignment
  const widgetRect = widget.getBoundingClientRect();
  const noteX = e.clientX - widgetRect.left;
  const noteY = e.clientY - widgetRect.top;
  pokeNote.style.left = noteX + 'px';
  pokeNote.style.top = noteY + 'px';
}

function resetPupils() {
  eyeLP.setAttribute('cx', eyeBaseL.cx); eyeLP.setAttribute('cy', eyeBaseL.cy);
  eyeRP.setAttribute('cx', eyeBaseR.cx); eyeRP.setAttribute('cy', eyeBaseR.cy);
  eyeLS.setAttribute('cx', 109.5); eyeLS.setAttribute('cy', 81.5);
  eyeRS.setAttribute('cx', 165.5); eyeRS.setAttribute('cy', 81.5);
}

// Global move trigger handler
window.addEventListener('mousemove', (e) => {
  if (isHovered) {
    trackMouseInteractions(e);
  }
});

// Structural mood layout switch controller
widget.addEventListener('click', () => {
  if (!isHovered || !activePresence || container.classList.contains('rocket-jetting-right') || container.classList.contains('rocket-spawning')) return;
  currentMoodIdx = (currentMoodIdx + 1) % moods.length;
  applyMoodStyle();
  triggerTyping();
});

// App Window Interface Logic Bounds
widget.addEventListener('mouseenter', () => {
  isHovered = true;
  widget.classList.add('active-hover');
  container.classList.add('cleo-body-hovered');

  if (exitTimeout) {
    clearTimeout(exitTimeout);
    exitTimeout = null;
  }

  if (!activePresence) {
    executeCoolRocketIntro();
  } else {
    if(container.classList.contains('rocket-jetting-right')) {
      container.classList.remove('rocket-jetting-right', 'engine-firing');
      resetToSystemDefaults();
    }
    bubble.classList.add('visible');
    applyMoodStyle();
    triggerTyping();
  }
});

widget.addEventListener('mouseleave', () => {
  isHovered = false;
  widget.classList.remove('active-hover');
  container.classList.remove('cleo-body-hovered');
  bubble.classList.remove('visible');
  pokeNote.classList.remove('visible');
  stopParticles();
  resetPupils();
  resetArmMovementStyles();

  exitTimeout = setTimeout(() => {
    if (!isHovered && activePresence) {
      executeCoolRocketExitRight();
    }
  }, 10000);
});

/* Strict explicit target constraint handler for the floating helper label */
bodyTarget.addEventListener('mouseenter', () => {
  if (activePresence && !container.classList.contains('rocket-jetting-right')) {
    pokeNote.classList.add('visible');
  }
});

bodyTarget.addEventListener('mouseleave', () => {
  pokeNote.classList.remove('visible');
});


function executeCoolRocketIntro() {
  activePresence = true;
  container.classList.remove('rocket-jetting-right');
  container.classList.add('engine-firing', 'rocket-spawning');
  
  setTimeout(() => {
    container.classList.remove('engine-firing', 'rocket-spawning');
    container.classList.add('ready');
    
    if (isHovered) {
      bubble.classList.add('visible');
      applyMoodStyle();
      triggerTyping();
    }
  }, 1050);
}

function resetArmMovementStyles() {
  widget.classList.remove('mode-cheeky', 'mode-panic', 'mode-dreamy', 'mode-bye');
}

function executeCoolRocketExitRight() {
  if (isHovered) return;

  widget.className = "widget-wrapper mode-bye";
  visor.setAttribute('fill', 'url(#vGBye)');
  mouth.setAttribute('d', 'M130 102 Q140 107 150 102'); 
  mouth.setAttribute('stroke', '#ff7300');
  
  antStem.setAttribute('fill', '#ff7300');
  antNode.setAttribute('fill', '#ff7300');
  earL.setAttribute('fill', 'url(#earGlowBye)');
  earR.setAttribute('fill', 'url(#earGlowBye)');
  
  glowWrap.style.filter = "drop-shadow(0 16px 40px rgba(255,115,0,0.18))";

  bubble.className = "chat-bubble visible bubble-bye";
  cursor.style.background = "#ff7300";
  cursor.style.boxShadow = "0 0 8px #ff7300";
  resetTyping();
  
  const byePhrase = "Blasting off! Catch you later! 🚀⚡";
  
  function typeBye(idx) {
    if (isHovered || idx >= byePhrase.length) {
      if (!isHovered) {
        setTimeout(() => {
          if (isHovered) return;
          bubble.classList.remove('visible');
          
          container.classList.add('engine-firing', 'rocket-jetting-right');
          startRocketSparkTrail();

          setTimeout(() => {
            if (isHovered) return;
            container.classList.remove('ready', 'engine-firing', 'rocket-jetting-right');
            stopParticles();
            resetToSystemDefaults();
            activePresence = false;
          }, 750);
        }, 1200);
      }
      return;
    }
    const ch = byePhrase[idx];
    const span = document.createElement('span');
    span.textContent = ch;
    if (idx > 13) span.className = "text-highlight-bye";
    typed.insertBefore(span, cursor);
    setTimeout(() => typeBye(idx + 1), 40);
  }
  
  typeBye(0);
}

function resetToSystemDefaults() {
  widget.className = "widget-wrapper";
  bubble.className = "chat-bubble";
  resetTyping();
  visor.setAttribute('fill', 'url(#vG)');
  mouth.setAttribute('d', 'M130 102 Q140 110 150 102');
  mouth.setAttribute('stroke', '#5ef0ff');
  blushL.setAttribute('opacity', '0.9');
  blushR.setAttribute('opacity', '0.9');
  earL.setAttribute('fill', 'url(#earGlow)');
  earR.setAttribute('fill', 'url(#earGlow)');
  antStem.setAttribute('fill', '#00dcff');
  antNode.setAttribute('fill', '#00dcff');
  glowWrap.style.filter = "drop-shadow(0 16px 36px rgba(0,180,255,0.22))";
}

function startRocketSparkTrail() {
  stopParticles();
  particleInterval = setInterval(() => {
    if (isHovered) return;
    const spark = document.createElement('div');
    spark.className = 'spark';
    
    const rect = container.getBoundingClientRect();
    const wrapperRect = widget.getBoundingClientRect();
    
    const px = (rect.left - wrapperRect.left) + (rect.width / 2) - 10 + (Math.random() * 20);
    const py = (rect.top - wrapperRect.top) + (rect.height) - 75;
    
    spark.style.left = px + 'px';
    spark.style.top  = py + 'px';
    spark.style.width = '3px';
    spark.style.height = '6px';
    spark.style.borderRadius = '2px';
    spark.style.background  = Math.random() > 0.4 ? '#ff5500' : '#ffaa00';
    spark.style.boxShadow   = '0 0 6px #ff3300';
    widget.appendChild(spark);
    
    const anim = spark.animate([
      { opacity: 1, transform: 'scaleY(1.5) translate(0,0)' },
      { opacity: 0, transform: 'scaleY(0.2) translate(-20px, 60px)' }
    ], { duration: 200 + Math.random() * 150, easing: 'ease-out' });
    anim.onfinish = () => spark.remove();
  }, 15);
}

function applyMoodStyle() {
  if (!isHovered || !activePresence || container.classList.contains('rocket-jetting-right')) return;
  const m = moods[currentMoodIdx];

  widget.className = "widget-wrapper active-hover " + m.wrapperClass;
  stopParticles();

  bubble.className = "chat-bubble visible " + m.bubbleClass;
  cursor.style.background = m.cursorColor;
  cursor.style.boxShadow = `0 0 8px ${m.cursorColor}`;

  visor.setAttribute('fill', m.visorFill);
  mouth.setAttribute('d', m.mouthD);
  mouth.setAttribute('stroke', m.mouthStroke);
  blushL.setAttribute('opacity', m.blushOpacity);
  blushR.setAttribute('opacity', m.blushOpacity);
  
  earL.setAttribute('fill', m.earFill);
  earR.setAttribute('fill', m.earFill);
  antStem.setAttribute('fill', m.antennaColor);
  antNode.setAttribute('fill', m.antennaColor);
  glowWrap.style.filter = m.glowFilter;

  if (m.particles === "sparks") startSparks();
  else if (m.particles === "stars") startStars();
}

function resetTyping() {
  clearTimeout(typingTimer);
  typed.innerHTML = '';
  typed.appendChild(cursor);
  charIdx = 0;
}

function triggerTyping() {
  resetTyping();
  const m = moods[currentMoodIdx];
  const phrase = m.phrases[Math.floor(Math.random() * m.phrases.length)];
  typeNext(phrase, m);
}

function typeNext(phrase, mood) {
  if (!isHovered || charIdx >= phrase.length || !activePresence) return;

  const ch = phrase[charIdx];
  const span = document.createElement('span');
  span.textContent = ch;

  for (const word of mood.highlightWords) {
    const idx = phrase.indexOf(word);
    if (idx >= 0 && charIdx >= idx && charIdx < idx + word.length) {
      span.classList.add(mood.highlightClass);
      break;
    }
  }

  charIdx++;
  typed.insertBefore(span, cursor);
  const delay = ch === '.' || ch === '!' || ch === '?' ? 180 :
                ch === ',' ? 100 : 20 + Math.random() * 15;
  typingTimer = setTimeout(() => typeNext(phrase, mood), delay);
}

function startSparks() {
  const isPanic = moods[currentMoodIdx].name === "panic";
  particleInterval = setInterval(() => {
    if (!isHovered || !activePresence) return;
    const spark = document.createElement('div');
    spark.className = 'spark';
    const rx = 35 + Math.random() * 125;
    const ry = 35 + Math.random() * 210;
    spark.style.left = rx + 'px';
    spark.style.top  = ry + 'px';
    const col = isPanic ? (Math.random() > 0.4 ? '#ff3b3b' : '#ffea00') : (Math.random() > 0.5 ? '#ffaa00' : '#ffe066');
    spark.style.background  = col;
    spark.style.boxShadow   = `0 0 6px ${col}`;
    widget.appendChild(spark);
    const angle = Math.random() * Math.PI * 2;
    const v = 20 + Math.random() * 35;
    const anim = spark.animate([
      { opacity: 1, transform: 'translate(0,0) scale(1)' },
      { opacity: 0, transform: `translate(${Math.cos(angle)*v}px,${Math.sin(angle)*v}px) scale(0)` }
    ], { duration: 380 + Math.random() * 280, easing: 'ease-out' });
    anim.onfinish = () => spark.remove();
  }, isPanic ? 80 : 140);
}

const STARS = ['✦','✧','⋆','·','★','☆'];
function startStars() {
  particleInterval = setInterval(() => {
    if (!isHovered || !activePresence) return;
    const star = document.createElement('div');
    star.className = 'star-particle';
    star.textContent = STARS[Math.floor(Math.random() * STARS.length)];
    star.style.left  = (20 + Math.random() * 160) + 'px';
    star.style.top   = (20 + Math.random() * 240) + 'px';
    const hue = 250 + Math.random() * 60;
    star.style.color = `hsl(${hue}, 80%, 80%)`;
    star.style.fontSize = (8 + Math.random() * 10) + 'px';
    widget.appendChild(star);
    const anim = star.animate([
      { opacity: 0,   transform: 'translateY(0) scale(0.5)' },
      { opacity: 0.9, transform: 'translateY(-12px) scale(1)', offset: 0.3 },
      { opacity: 0,   transform: 'translateY(-28px) scale(0.7)' }
    ], { duration: 1200 + Math.random() * 800, easing: 'ease-out' });
    anim.onfinish = () => star.remove();
  }, 200);
}

function stopParticles() {
  clearInterval(particleInterval);
  document.querySelectorAll('.spark, .star-particle').forEach(el => el.remove());
}
</script>
</body>
